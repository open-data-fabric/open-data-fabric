# $schema: https://opendatafabric.org/schemas/flow/v1alpha1/Flow
$schema: https://opendatafabric.org/schemas/flow/v1alpha1/Flow
headers:
  name: sensor.temp.http
spec:
  target: Dataset:sensor.temp
  triggers:
    - kind: Source
      source: sensor.temp.http
      minRecordsToAwait: 100
      maxAwaitInterval: 1h
  tasks:
    - kind: Ingest
      source: sensor.temp.http
      params:
        targetSliceRecords: 10000
