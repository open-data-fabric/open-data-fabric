# $schema: https://opendatafabric.org/schemas/dataset/v1alpha1/Dataset
$schema: https://opendatafabric.org/schemas/dataset/v1alpha1/Dataset
headers:
  name: sensor.temp.hourly
spec:
  kind: Derivative
  metadata:
    - kind: SetTransform
      inputs:
        - datasetRef: sensor.temp
      transform:
        kind: Sql
        engine: flink
        query: |
          SELECT
            TUMBLE_START(event_time, INTERVAL '1' HOUR) as event_time,
            min(value) as value_min,
            max(value) as value_max
          FROM `sensor.temp`
          GROUP BY TUMBLE(event_time, INTERVAL '1' HOUR)
