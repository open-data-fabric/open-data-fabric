# $schema: https://opendatafabric.org/schemas/source/v1alpha1/Source
$schema: https://opendatafabric.org/schemas/source/v1alpha1/Source
headers:
  name: ca.bankofcanada
spec:
  ingress:
    kind: Url
    url: https://www.bankofcanada.ca/valet/observations/group/FX_RATES_DAILY/csv?start_date=2017-01-03
  read:
    kind: Csv
    header: true
    schema:
      fields:
        - name: date
          type: Timestamp
        - name: FXAUDCAD
          type:
            kind: Decimal
            scale: 19
            precision: 6
        - name: FXUSDCAD
          type:
            kind: Decimal
            scale: 19
            precision: 6
  preprocess:  # Rename CSV columns
    kind: Sql
    engine: datafusion
    query: |
      select
        date as event_time,
        FXAUDCAD as fxaudcad,
        FXUSDCAD as fxusdcad
      from input
  merge:
    kind: Ledger
    primaryKey:
      - date
  vocab:
    eventTimeColumn: date

