# $schema: https://opendatafabric.org/schemas/dataset/v1alpha1/Projection
$schema: https://opendatafabric.org/schemas/dataset/v1alpha1/Projection
headers:
  name: ca.bankofcanada.latest
spec:
  inputs:
    - datasetRef: ca.bankofcanada
  project:
    kind: Sql
    engine: datafusion
    # Provides instant access to the latest exchange rates
    query: |
      select
        latest(event_time) as event_time,
        latest(fxaudcad) as fxaudcad,
        latest(fxusdcad) as fxusdcad
      from `ca.bankofcanada`

