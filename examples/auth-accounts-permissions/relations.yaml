# $schema: https://opendatafabric.org/schemas/auth/v1alpha1/Relations
$schema: https://opendatafabric.org/schemas/auth/v1alpha1/Relations
headers:
  name: alice-bob
spec:
  relations:
    - subject:  # Long form
        type: Account
        name: alice
      relation: role
      value: maintainer
      object: Dataset:bob/bobs-dataset  # Short form, equivalent to { type: Dataset, account: { name: bob }, name: bobs-dataset }
  attributes:
    - object: Dataset:bob/bobs-dataset
      name: allowPublicRead
      value: true
    - object: Dataset:bob/bobs-dataset
      name: allowAnonymousRead
      value: false
