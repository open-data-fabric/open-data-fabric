# $schema: https://opendatafabric.org/schemas/flow/v1alpha1/Flow.json
$schema: https://opendatafabric.org/schemas/flow/v1alpha1/Flow.json
headers:
  name: gc-datasets
spec:
  triggers:
    - kind: Schedule
      cron: "@daily"
  tasks:
    - kind: GarbageCollection
      dataset:
        pattern: '%'

