      name: Apache 2.0
      shortName: Apache-2.0
      spdxId: Apache-2.0
      websiteUrl: https://www.apache.org/licenses/LICENSE-2.0
  volume: pv:my-s3-bucket  # Here `pv` is a type alias of the `PersistentVolume`

