# $schema: https://opendatafabric.org/schemas/flow/v1alpha1/Flow
$schema: https://opendatafabric.org/schemas/flow/v1alpha1/Flow
headers:
  name: compact-all-roots
spec:
  target:
    type: Dataset
    name: '%'
    labels:
      kind: Root
  triggers:
    - kind: Event
      events:
        type: dataset.ref.updated
      cooldown: 10min
  tasks:
    - kind: Compaction
      # if: ????  # GH actions like preconditions
      # compactionPolicy:
      #   minUncompactedRows: ???  # Take a look at compaction RFC
      params:
        maxSliceSize: 100MiB
        maxSliceRecords: 10000

